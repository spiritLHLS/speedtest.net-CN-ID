name: Daily Update from Private Repo

on:
  schedule:
    - cron: '0 23 * * *'  # 每天23:00 UTC运行
  workflow_dispatch:

jobs:
  update_and_push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - name: Checkout current public repository
      uses: actions/checkout@v7
      with:
        path: public-repo
        fetch-depth: 0
    
    - name: Checkout private repository
      uses: actions/checkout@v7
      with:
        repository: spiritLHLS/speedtest.net-ID
        path: private-repo
        token: ${{ secrets.REPO_ACCESS_TOKEN }}
    
    - name: Setup Python environment
      uses: actions/setup-python@v6
      with:
        python-version: 3.8
    
    - name: Install dependencies
      run: |
        pip install pypinyin
    
    - name: Run processing scripts in private repo
      run: |
        cd private-repo
        mkdir -p logs results
        # 删除全部旧日志，只保留本次运行日志
        rm -f logs/*.log 2>/dev/null || true
        LOG_FILE="logs/$(date +'%Y-%m-%d').log"
        # 在私有仓库中运行fenlei.py和xifen.py，输出全部重定向到日志文件
        python fenlei.py >> "$LOG_FILE" 2>&1 || true
        python xifen.py >> "$LOG_FILE" 2>&1 || true
    
    - name: Copy processed data to public repo
      run: |
        # 只复制需要的CSV文件到公共仓库（避免复制敏感数据）
        cp private-repo/results/CN.csv public-repo/ 2>/dev/null || true
        cp private-repo/results/TW.csv public-repo/ 2>/dev/null || true
        cp private-repo/results/HK.csv public-repo/ 2>/dev/null || true
        cp private-repo/results/JP.csv public-repo/ 2>/dev/null || true
        cp private-repo/results/SG.csv public-repo/ 2>/dev/null || true
        cp private-repo/results/ls_sg_hk_jp.csv public-repo/ 2>/dev/null || true
    
    - name: Run main.py in public repo
      run: |
        # logs/ 已在上一步创建，这里延用同一个日期日志文件
        LOG_FILE="$GITHUB_WORKSPACE/private-repo/logs/$(date +'%Y-%m-%d').log"
        cd "$GITHUB_WORKSPACE/public-repo"
        # 在公共仓库中运行main.py，stdout/stderr全部重定向到日志文件
        python main.py >> "$LOG_FILE" 2>&1 || true
        # 将 main.py 内部写入的 error.log 合并到日志文件后删除
        [ -f error.log ] && cat error.log >> "$LOG_FILE" && rm -f error.log || true
        
    - name: Update private repo README with server count
      run: |
        cd private-repo
        # 更新私有仓库的README中的服务器数量
        # 根据私有仓库中fenlei.py和xifen.py处理后的文件来统计
        if [ -f "results/result.csv" ]; then
          count=$(($(wc -l < results/result.csv) - 1))
        elif [ -f "results/speedtest_results.csv" ]; then
          count=$(($(wc -l < results/speedtest_results.csv) - 1))
        else
          count=0
        fi
        sed -i "s/本仓库收录服务器数量(实时)：.*/本仓库收录服务器数量(实时)：${count}/" README.md || true
    
    - name: Clean up invalid files in private repo
      run: |
        cd private-repo/results
        # 删除之前误生成的公共仓库专用分类文件
        rm -f CN_Mobile.csv CN_Telecom.csv CN_Unicom.csv 2>/dev/null || true
    
    - name: Update public repo README
      run: |
        cd public-repo
        # 更新公共仓库的README日期
        date_str=$(date +'%Y/%m/%d')
        sed -i "s#^数据更新时间:.*#数据更新时间: ${date_str}#" README.md || true
        
        # 从私有仓库同步服务器数量到公共仓库
        cd ../private-repo
        count=$(grep -oP '本仓库收录服务器数量\(实时\)：\K[0-9]+' README.md || echo "0")
        cd ../public-repo
        sed -i "s/闭源收录服务器数量(实时)：.*/闭源收录服务器数量(实时)：${count}/" README.md || true
    
    - name: Clean up sensitive files in public repo
      run: |
        cd public-repo
        # 删除可能从私有仓库复制过来的敏感文件和日志文件
        rm -f speedtest_results.csv result.csv error.log 2>/dev/null || true
    
    - name: Commit and push to private repository
      run: |
        cd private-repo
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"
        # 只提交私有仓库自己处理的文件，不包含公共仓库生成的分类文件
        git add results/ || true
        git add logs/ || true
        git add README.md
        (
          git commit -m "Auto update CSV files - $(date +'%Y-%m-%d')"
          git push
        ) || true
    
    - name: Commit and push to public repository  
      run: |
        cd public-repo
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"
        # 只添加应该公开的CSV文件，避免泄露私有仓库的敏感数据
        git add CN.csv CN_Mobile.csv CN_Telecom.csv CN_Unicom.csv || true
        git add TW.csv HK.csv JP.csv SG.csv ls_sg_hk_jp.csv || true
        git add README.md
        (
          git commit -m "Update CSV files - $(date +'%Y-%m-%d') [skip ci]"
          git push
        ) || true
